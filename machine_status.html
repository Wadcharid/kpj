    /* ==========================================
       3. Scale & Resize Logic (แก้ปัญหาแผนผังเละ)
    ========================================== */
    function scaleMap() {
        const mapArea = document.getElementById('mapArea');
        const mapContainer = document.getElementById('mapContainer');
        if(!mapArea || !mapContainer) return;
        
        // ขนาดตั้งต้นของ Canvas
        const targetWidth = 1300; 
        const targetHeight = 850;
        
        // คำนวณอัตราส่วนการย่อ-ขยาย ตามความกว้างของ mapArea ณ ตอนนั้น
        const scale = mapArea.clientWidth / targetWidth;
        
        // สั่ง Scale ตัวกล่อง
        mapContainer.style.transform = `scale(${scale})`;
        
        // ปรับความสูงของ mapArea ให้พอดีกับกล่องที่ถูก scale ไปแล้ว
        mapArea.style.minHeight = (targetHeight * scale) + 'px';
    }

    // สั่งคำนวณตอนโหลดหน้าเสร็จ และตอนดึงหน้าต่าง (Resize)
    window.addEventListener('load', scaleMap);
    window.addEventListener('resize', scaleMap);

        // ตั้งค่า Default
        machinesMap.forEach(m => {

        });

        renderMap();
        renderAlerts();

        setTimeout(scaleMap, 50);

    /* ==========================================
       5. Render UI
    ========================================== */
    function renderMap() {
        const mapContainer = document.getElementById('mapContainer');
        // ล้างกล่องเดิมทิ้ง
        document.querySelectorAll('.building-container').forEach(e => e.remove());

        // วาดตึก
        buildingsConfig.forEach(b => {
            const container = document.createElement('div');
            container.className = 'building-container';
            container.style.left = b.left;
            container.style.top = b.top;
            if(b.width) container.style.width = b.width;

            const title = document.createElement('div');
            title.className = 'building-title';
            title.innerText = b.title;
            container.appendChild(title);

            const box = document.createElement('div');
            box.className = `building-box layout-${b.layout}`;
            box.id = b.id;
            container.appendChild(box);

            mapContainer.appendChild(container);
        });

        // ใส่เครื่องจักรลงตึก
        machinesMap.forEach(m => {
            const box = document.getElementById(m.b);
            if(box) {
                const item = document.createElement('div');
                item.className = 'machine-item';
                
                if(box.classList.contains('layout-circle')) item.classList.add('circle-text');

                const stat = machineData[m.id]?.status || "READY";
                const dotClass = stat === "OUT OF SERVICE" ? "out" : "";

                item.innerHTML = `<div class="status-dot ${dotClass}"></div><span>${m.label}</span>`;
                box.appendChild(item);
            }
        });
    }

    function renderAlerts() {
        const container = document.getElementById('alertCardsContainer');
        container.innerHTML = '';
        let hasError = false;

        machinesMap.forEach(m => {
            const data = machineData[m.id];
            if(data && data.status === "OUT OF SERVICE") {
                hasError = true;
                const card = document.createElement('div');
                card.className = 'alert-card';
                card.innerHTML = `
                    <h4>🔧 ${m.id}</h4>
                    <p><strong>สถานะ:</strong> <span style="color:var(--color-out)">Out of Service</span></p>
                    <p><strong>รายละเอียด:</strong> ${data.detail || '-'}</p>
                    <p><strong>เลขแจ้งซ่อม:</strong> ${data.repair_no || '-'}</p>
                `;
                container.appendChild(card);
            }
        });

        if(!hasError) {
            container.innerHTML = '<p style="color:#666; text-align:center; padding: 20px;">✅ อุปกรณ์ทำงานปกติทั้งหมด</p>';
        }
    }

    /* ==========================================
       6. Login & Admin Panel Logic
    ========================================== */
    function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }

    function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u === 'operator' && p === 'operator') {
            closeLoginModal();
            openAdminPanel();
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        } else {
            alert('รหัสผ่านไม่ถูกต้อง');
        }
    }

    function openAdminPanel() {
        document.getElementById('adminPanel').style.display = 'flex';
        renderAdminForm();
    }
    function closeAdmin() {
        document.getElementById('adminPanel').style.display = 'none';
    }

    function renderAdminForm() {
        const container = document.getElementById('adminFormContainer');
        let html = '<table class="edit-table"><thead><tr><th>ชื่ออุปกรณ์</th><th>สถานะ</th><th>รายละเอียด</th><th>เลขแจ้งซ่อม</th></tr></thead><tbody>';
        
        machinesMap.forEach(m => {
            const d = machineData[m.id] || { status: 'READY', detail: '', repair_no: '' };
            const selReady = d.status === 'READY' ? 'selected' : '';
            const selOut = d.status === 'OUT OF SERVICE' ? 'selected' : '';
            
            html += `
                <tr>
                    <td><strong>${m.id}</strong></td>
                    <td>
                        <select id="stat_${m.id}">
                            <option value="READY" ${selReady}>READY</option>
                            <option value="OUT OF SERVICE" ${selOut}>OUT OF SERVICE</option>
                        </select>
                    </td>
                    <td><input type="text" id="det_${m.id}" value="${d.detail}" placeholder="รายละเอียด"></td>
                    <td><input type="text" id="rep_${m.id}" value="${d.repair_no}" placeholder="เลขแจ้งซ่อม"></td>
                </tr>
            `;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    async function saveData() {
        machinesMap.forEach(m => {
            machineData[m.id] = {
                status: document.getElementById(`stat_${m.id}`).value,
                detail: document.getElementById(`det_${m.id}`).value,
